# ============================================
# Mavibase Docker Compose - Production (BYOD)
# ============================================
# Bring Your Own Database configuration.
# Use this when you have external managed databases:
# - Neon, Supabase, AWS RDS, etc. for PostgreSQL
# - Upstash, ElastiCache, etc. for Redis
#
# Usage:
#   1. Copy .env.docker.example to .env
#   2. Edit .env with your external database URLs
#   3. Run: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  mavibase:
    image: ghcr.io/mavibase/mavibase:latest
    pull_policy: always
    container_name: mavibase
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-5000}:5000"
      - "${CONSOLE_PORT:-3000}:3000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 5000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # External database connections (user provides these)
      DATABASE_URL: ${DATABASE_URL}
      PLATFORM_DB_URL: ${PLATFORM_DB_URL}
      REDIS_URL: ${REDIS_URL}
      
      # JWT & Security
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      
      # Token expiry
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}
      
      # CORS & Frontend
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      
      # Quotas
      DEFAULT_MAX_COLLECTIONS: ${DEFAULT_MAX_COLLECTIONS:-100}
      DEFAULT_MAX_DOCUMENTS_PER_COLLECTION: ${DEFAULT_MAX_DOCUMENTS_PER_COLLECTION:-500}
      DEFAULT_MAX_STORAGE_MB: ${DEFAULT_MAX_STORAGE_MB:-1024}
      
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10000}
      
      # Document settings
      MAX_REQUEST_BODY_SIZE: ${MAX_REQUEST_BODY_SIZE:-1mb}
      MAX_DOCUMENT_SIZE_KB: ${MAX_DOCUMENT_SIZE_KB:-256}
      MAX_QUERY_LIMIT: ${MAX_QUERY_LIMIT:-100}
      MAX_BULK_OPERATIONS: ${MAX_BULK_OPERATIONS:-1000}
      
      # Email
      ENABLE_EMAIL_SERVICE: ${ENABLE_EMAIL_SERVICE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      
      # Auto-migrate on startup
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
